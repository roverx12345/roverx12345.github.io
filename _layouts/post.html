---
layout: default
---

<article class="post-page">
  <header class="post-header">
    <a class="back-link" href="{{ '/blog/' | relative_url }}">← Blog</a>
    <p class="eyebrow">{{ page.date | date: "%Y-%m-%d" }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.description %}
      <p class="post-description">{{ page.description }}</p>
    {% endif %}
  </header>

  <div class="prose">
    {{ content }}
  </div>
</article>
